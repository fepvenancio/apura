name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  setup-infra:
    name: Setup Cloudflare Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create queues and buckets (idempotent)
        run: |
          npx wrangler queues create email-outbound 2>/dev/null || echo "Queue email-outbound already exists"
          npx wrangler queues create report-generation 2>/dev/null || echo "Queue report-generation already exists"
          npx wrangler r2 bucket create apura-reports 2>/dev/null || echo "R2 bucket apura-reports already exists"

  migrate:
    name: Run D1 Migrations
    needs: setup-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run D1 migrations
        run: bash deploy/migrate.sh main

  deploy-workers:
    name: Deploy Workers
    needs: migrate
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        worker:
          - name: apura-ws
            path: packages/ws-gateway
          - name: apura-api
            path: packages/api-gateway
          - name: apura-worker
            path: packages/worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy ${{ matrix.worker.name }}
        working-directory: ${{ matrix.worker.path }}
        run: npx wrangler deploy

  deploy-frontend:
    name: Deploy Frontend (Workers via OpenNext)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://apura-api.stela-app.workers.dev
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /pt/home
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /pt/home
        run: |
          npx opennextjs-cloudflare build
          npx wrangler deploy --var CLERK_SECRET_KEY:$CLERK_SECRET_KEY
