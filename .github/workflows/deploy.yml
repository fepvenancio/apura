name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  migrate:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run D1 migrations
        run: bash deploy/migrate.sh main

  deploy-workers:
    name: Deploy Workers
    needs: migrate
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        worker:
          - name: apura-ai
            path: packages/ai-orchestrator
          - name: apura-ws
            path: packages/ws-gateway
          - name: apura-api
            path: packages/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy ${{ matrix.worker.name }}
        working-directory: ${{ matrix.worker.path }}
        run: npx wrangler deploy

  deploy-frontend:
    name: Deploy Frontend (Production)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        run: npx wrangler pages deploy out --project-name apura-web --branch main --commit-dirty=true
