name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  setup-infra:
    name: Setup Cloudflare Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create queues and buckets (idempotent)
        run: |
          npx wrangler queues create email-outbound 2>/dev/null || echo "Queue email-outbound already exists"
          npx wrangler queues create report-generation 2>/dev/null || echo "Queue report-generation already exists"
          npx wrangler r2 bucket create apura-reports 2>/dev/null || echo "R2 bucket apura-reports already exists"

  migrate:
    name: Run D1 Migrations
    needs: setup-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run D1 migrations
        run: bash deploy/migrate.sh main

  deploy-workers:
    name: Deploy Workers
    needs: migrate
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        worker:
          - name: apura-ai
            path: packages/ai-orchestrator
          - name: apura-ws
            path: packages/ws-gateway
          - name: apura-api
            path: packages/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy ${{ matrix.worker.name }}
        working-directory: ${{ matrix.worker.path }}
        run: npx wrangler deploy

  deploy-frontend:
    name: Deploy Frontend (Production)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.apura.xyz
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        run: npx wrangler pages deploy out --project-name apura-web --branch main --commit-dirty=true
