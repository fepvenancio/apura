name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ai-orchestrator deps
        working-directory: packages/ai-orchestrator
        run: npm install

      - name: Run SQL validator tests
        working-directory: packages/ai-orchestrator
        run: npx tsx --test src/validation/__tests__/sql-validator.test.ts

  deploy-workers:
    name: Deploy Workers
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      max-parallel: 1
      matrix:
        worker:
          - name: apura-ai
            path: packages/ai-orchestrator
          - name: apura-ws
            path: packages/ws-gateway
          - name: apura-api
            path: packages/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ${{ matrix.worker.path }}
        run: npm install

      - name: Deploy ${{ matrix.worker.name }}
        working-directory: ${{ matrix.worker.path }}
        run: npx wrangler deploy

  deploy-frontend:
    name: Deploy Frontend
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        run: npx wrangler pages deploy out --project-name apura-web --commit-dirty=true
