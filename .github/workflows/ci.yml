name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install

      - name: Install ai-orchestrator dependencies
        working-directory: packages/ai-orchestrator
        run: npm install

      - name: Install api-gateway dependencies
        working-directory: packages/api-gateway
        run: npm install

      - name: Install ws-gateway dependencies
        working-directory: packages/ws-gateway
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Typecheck shared
        working-directory: packages/shared
        run: npx tsc --noEmit

      - name: Run SQL validator tests
        working-directory: packages/ai-orchestrator
        run: npx tsx --test src/validation/__tests__/sql-validator.test.ts

      - name: Build frontend
        working-directory: frontend
        run: npm run build
