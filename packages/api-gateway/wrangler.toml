name = "apura-api"
account_id = "616231e4ffa88bb203ec4cbedeab4a8e"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

routes = [
  { pattern = "api.apura.xyz", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "apura-main"
database_id = "48a7c67d-223e-4ee1-8c87-9a9b3231def0"

[[kv_namespaces]]
binding = "CACHE"
id = "290e5fb7d86847b6823b79be9b6d2cb4"

# IMPORTANT: INTERNAL_SECRET and JWT_SECRET must be set as Cloudflare secrets, not vars.
# Run: wrangler secret put INTERNAL_SECRET
# Run: wrangler secret put JWT_SECRET
[vars]

[[services]]
binding = "AI_ORCHESTRATOR"
service = "apura-ai"

[[services]]
binding = "WS_GATEWAY"
service = "apura-ws"

[[queues.producers]]
binding = "REPORT_QUEUE"
queue = "report-generation"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "email-outbound"

[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "apura-reports"
