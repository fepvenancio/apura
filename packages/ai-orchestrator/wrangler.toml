name = "apura-ai"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
AI_MODEL_DEFAULT = "claude-sonnet-4-5-20241022"
AI_MODEL_BUDGET = "claude-haiku-4-5-20251001"

[[kv_namespaces]]
binding = "CACHE"
id = "placeholder"

[[d1_databases]]
binding = "DB"
database_name = "apura-main"
database_id = "placeholder"
