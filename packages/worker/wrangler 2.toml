name = "apura-worker"
account_id = "616231e4ffa88bb203ec4cbedeab4a8e"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# --- Queue consumers ---

[[queues.consumers]]
queue = "report-generation"
max_batch_size = 5
max_batch_timeout = 30

[[queues.consumers]]
queue = "email-outbound"
max_batch_size = 10
max_batch_timeout = 15

# --- Queue producers (report → email) ---

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "email-outbound"

# --- R2 ---

[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "apura-reports"

# --- D1 ---

[[d1_databases]]
binding = "DB"
database_name = "apura-main"
database_id = "48a7c67d-223e-4ee1-8c87-9a9b3231def0"

# --- Service bindings ---

[[services]]
binding = "WS_GATEWAY"
service = "apura-ws"

# --- Vars ---

[vars]
FROM_EMAIL = "Apura <reports@apura.xyz>"
FROM_NAME = "Apura"

# Secrets (set via `wrangler secret put`):
#   RESEND_API_KEY
#   INTERNAL_SECRET
